name: 'dbt_utsikt'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'dbt_utsikt'
flags:
  send_anonymous_usage_stats: False

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
models:
  dbt_utsikt:
    # Config indicated by + and applies to all files under models/example/
    # Farger valgt fra her: https://aksel.nav.no/grunnleggende/styling/design-tokens#h042525372dcd
    staging:
      +materialized: ephemeral
      +docs:
        node_color: '#C1CB33' #limegreen 200
    intermediate:
      +materialized: view
      +docs:
        node_color: '#3380A5' #deepblue 400      
    marts:
      agg:
        +materialized: view
        +docs:
          node_color: '#8269A2' #Purple 400
      fak:
        +materialized: incremental
        +docs:
          node_color: '#8269A2' #Purple 400
