version: 2

models:
  - name: fak_beregninger
    description: 'Faktatabell med alle beregningene fra venteregisteret'
    columns:
      - name: beregning_id
        description: 'Identifikator for beregninger i Oppdragssystemet.'
        data_tests:
          - unique
          - not_null
      - name: faggruppe_kode
        description: 'Kode for faggruppe. En faggruppe består av flere fagområder hvor man ønsker en samlet felles skatt- og trekkberegning. F.eks. PEN for pensjonsrelaterte ytelser'
        data_tests:
          - not_null
      - name: faggruppe_navn
        description: 'Navn/beskrivelse på faggruppe'
      - name: beregnet_dato
        description: 'Datoen beregningen er utført i Oppdragssystemet.'
        data_tests:
          - not_null
      - name: lastet_tid_kilde
        description: 'Tidspunktet for når raden er lastet inn i kildetabellen.'
        data_tests:
          - not_null
          - eldre_enn_to_ar_gammelt
      - name: pk_beregning
        description: 'Primærnøkkel for beregninger. Hash av beregning_id'
      - name: lastet_tid
        description: 'Tidsstempel for når raden er lastet inn i tabellen'
  - name: fak_oppdrag
    description: 'Faktatabell med oppdrag fra Oppdragssystemet'
    columns:
      - name: pk_oppdrag
        description: 'Primærnøkkel for oppdrag. Hash av oppdrag_id'
      - name: oppdrag_id
        description: 'Identifikator på utbetalingsoppdraget, unik identifikator som Oppdragssystemet oppretter når man mottar ett vedtak til utbetaling fra fagsystem.'
      - name: fagomrade_kode
        description: 'En kode som angir selve ytelsen som beregningen gjelder, f.eks. AAP for arbeidsavklaringspenger'
      - name: fagomrade_navn
        description: 'Navn/beskrivelse på fagområde'
      - name: faggruppe_kode
        description: 'Kode for faggruppe. En faggruppe består av flere fagområder hvor man ønsker en samlet felles skatt- og trekkberegning. F.eks. PEN for pensjonsrelaterte ytelser'
      - name: faggruppe_navn
        description: 'Navn/beskrivelse på faggruppe'
      - name: kildesystem
        description: 'Kildesystem hentet fra kode_komponent i t_oppdrag_kilde'
      - name: lastet_tid_kilde
        description: 'Tidspunktet for når raden er lastet inn i kildetabellen.'
      - name: lastet_tid
        description: 'Tidsstempel for når raden er lastet inn i tabellen'
  - name: fak_stoppnivaer
    description: 'Faktatabell med stoppnivåer fra venteregisteret'
    columns:
      - name: pk_stoppnivaer
        description: 'Primærnøkkel for stoppnivå. Hash av beregning_id og stoppniva_id'
        data_tests:
          - unique
      - name: beregning_id
        description: 'Identifikator for beregninger i Oppdragssystemet.'
        data_tests:
          - not_null
      - name: stoppniva_id
        description: 'Identifikator for stoppnivå i Oppdragssystemet'
        data_tests:
          - not_null
      - name: oppdrag_id
        description: 'Identifikator på utbetalingsoppdraget, unik identifikator som Oppdragssystemet oppretter når man mottar ett vedtak til utbetaling fra fagsystem.'
        data_tests:
          - not_null
      - name: fagsystem_id
        description: 'Identifikator fra vedtaksløsningen som har avlevert ett utbetalingsoppdrag'
        data_tests:
          - not_null
      - name: type_skatt
        description: 'Angir om det er beregnet skatt med prosenttrekk eller tabelltrekk. Med denne kan man oppdage feil hvis skattekort ikke har kunnet blitt innhentet (skjer ikke ofte, men har skjedd) '
      - name: periode_fom_dato
        description: 'Startdatoen stoppnivået gjelder for. Sammen med dato_periode_tom utgjør dette perioden stoppnivået gjelder for.'
      - name: periode_tom_dato
        description: 'Sluttdatoen stoppnivået gjelder for. Sammen med dato_periode_fom utgjør dette perioden stoppnivået gjelder for.'
      - name: forfall_dato
        description: 'Dato for når stoppnivået skal utbetales.'
      - name: fagomrade_kode
        description: 'En kode som angir selve ytelsen som beregningen gjelder, f.eks. AAP for arbeidsavklaringspenger'
        data_tests:
          - not_null
      - name: overfores_dato
        description: 'Dato for når stoppnivået er planlagt overført til reskontro'
      - name: fagomrade_navn
        description: 'Navn/beskrivelse på fagområde'
      - name: faggruppe_navn
        description: 'Navn/beskrivelse på faggruppe'
      - name: beregnet_dato
        description: 'Datoen beregningen er utført i Oppdragssystemet.'
      - name: lastet_tid_kilde
        description: 'Tidspunktet for når raden er lastet inn i kildetabellen.'
        data_tests:
          - not_null
          - eldre_enn_to_ar_gammelt
      - name: belop_brutto
        description: 'Brutto beløp for stoppnivået. Regnet ut ved å summere beløp fra stoppnivaer_detaljer where linje_id > 0'
      - name: lastet_tid
        description: 'Tidsstempel for når raden er lastet inn i tabellen'
  - name: fak_stoppnivaer_detaljer
    description: 'Stoppnivåer brytt ned med flere detaljer'
    columns:
      - name: pk_stoppnivaer_detaljer
        description: 'Primærnøkkel for stoppnivaer_detaljer. Hash av beregning_id, stoppniva_id, linjenr'
      - name: beregning_id
        description: 'Identifikator for beregninger i Oppdragssystemet.'
      - name: stoppniva_id
        description: 'Identifikator for stoppnivå i Oppdragssystemet'
      - name: linjenr
        description: 'En del av unik identifikator i tabellen'
      - name: linje_id
        description: 'løpenummer på informasjon fra fagsystemet om utbetaling. Skatten vil ikke ha et linjenummer og derfor 0.'
      - name: klasse_kode
        description: 'klassifikasjon av hva utbetalingen gjelder'
      - name: faktisk_fom_dato
        description: 'Startdatoen stoppnivået faktisk gjelder for. Sammen med faktisk_tom_dato utgjør dette den faktiske perioden stoppnivået gjelder for.'
      - name: faktisk_tom_dato
        description: 'Sluttdatoen stoppnivået faktisk gjelder for. Sammen med faktisk_fom_dato utgjør dette den faktiske perioden stoppnivået gjelder for.'
      - name: trekkvedtak_id
        description: 'Identifikator for trekktype som beløp gjelder for'
      - name: belop
        description: 'Beløp'
      - name: lastet_tid_kilde
        description: 'Tidspunktet for når raden er lastet inn i kildetabellen.'
      - name: lastet_tid
        description: 'Tidsstempel for når raden er lastet inn i tabellen'
  - name: fak_stoppstatus
    description: 'Faktatabell med stoppstatuser fra venteregisteret'
    columns:
      - name: pk_stoppstatus
        description: 'Primærnøkkel for stoppstatus. Hash av beregning_id, stoppniva_id og lastet_tid_kilde'
        data_tests:
          - unique
      - name: beregning_id
        description: 'Identifikator for beregninger i Oppdragssystemet.'
        data_tests:
          - not_null
      - name: stoppniva_id
        description: 'Identifikator for stoppnivå i Oppdragssystemet'
        data_tests:
          - not_null
      - name: ventestatus_kode
        description: 'Kode for ventestatus. F.eks OVFO (for Overført til UR)'
      - name: ventestatus_beskrivelse
        description: 'Beskrivelse av ventestatuskode, eks Overført til UR'
      - name: lastet_tid_kilde
        description: 'Tidspunktet for når raden er lastet inn i kildetabellen.'
        data_tests:
          - not_null
          - eldre_enn_to_ar_gammelt
      - name: gyldig_fom_tid
        description: 'tidspunkt raden er gyldig fra'
      - name: gyldig_til_tid
        description: 'tidspunkt når raden er gyldig til'
      - name: handteres_manuelt_flagg
        description: 'Flagg som tilsier om ventestatusen må håndteres manuelt eller ikke'
      - name: lastet_tid
        description: 'Tidsstempel for når raden er lastet inn i tabellen'
      - name: fagomrade_kode
        description: 'En kode som angir selve ytelsen som beregningen gjelder, f.eks. AAP for arbeidsavklaringspenger'
      - name: fagomrade_navn
        description: 'Navn/beskrivelse på fagområde'
      - name: faggruppe_navn
        description: 'Navn/beskrivelse på faggruppe'
